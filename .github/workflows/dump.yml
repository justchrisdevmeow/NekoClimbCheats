name: Dump & Build NekoClimbCheats
on:
  workflow_dispatch:

jobs:
  dump:
    runs-on: windows-latest
    steps:
      - name: Download IPA
        run: curl -L -o game.ipa "https://temp.sh/AjNex/Hill_Climb_Racing_2_iOS_Mod_IPA_No_Jailbreak_Cheats_1.72.4_Hacked_IPA_by_iOSGods.com.ipa"
        
      - name: Download Il2CppDumper (working link)
        run: curl -L -o dumper.zip "https://github.com/Perfare/Il2CppDumper/releases/download/v6.7.46/Il2CppDumper-win-v6.7.46.zip"
        
      - name: Extract Il2CppDumper
        run: 7z x dumper.zip -oIl2CppDumper
        
      - name: Extract IPA
        run: 7z x game.ipa -oextracted
        
      - name: Run Il2CppDumper
        shell: pwsh
        run: |
          $appFolder = Get-ChildItem "extracted\Payload" -Directory | Select-Object -First 1
          $exePath = Join-Path $appFolder.FullName "HillClimbRacing2"
          $metadataPath = Join-Path $appFolder.FullName "Data\Managed\Metadata\global-metadata.dat"
          Write-Host "Dumping from: $exePath"
          .\Il2CppDumper\Il2CppDumper.exe $exePath $metadataPath output
          
      - name: Upload dump.cs
        uses: actions/upload-artifact@v4
        with:
          name: hcr2_dump
          path: output/dump.cs
