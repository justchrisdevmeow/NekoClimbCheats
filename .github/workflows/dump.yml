name: Dump HCR2 Offsets from Mega
on:
  workflow_dispatch:
    inputs:
      mega_url:
        description: 'Mega.nz file URL'
        required: true
        default: 'https://mega.nz/file/y5JiCDqY#p9TzJ0ty8D3qXvBErgaU2Wkc2Zmo5-8fqkllxq7UN8o'

jobs:
  dump:
    runs-on: windows-latest
    steps:
      - name: Install Python dependencies
        run: |
          pip install mega.py --upgrade
          pip install 'tenacity>=8.0.0'
          
      - name: Download IPA from Mega
        run: |
          python -c "
          import urllib.parse
          url = '${{ inputs.mega_url }}'
          # Extract file ID and key
          # Mega URLs format: https://mega.nz/file/FILEID#KEY
          parts = url.replace('https://mega.nz/file/', '').split('#')
          file_id = parts[0]
          key = parts[1]
          
          from mega import Mega
          m = Mega()
          m.download(file_id, 'game.ipa', key=key)
          "
          
      - name: Download Il2CppDumper
        run: |
          curl -L -o dumper.zip https://github.com/Perfare/Il2CppDumper/releases/download/v6.7.0/Il2CppDumper-v6.7.0-win-x64.zip
          7z x dumper.zip -oIl2CppDumper
          
      - name: Extract IPA
        run: |
          7z x game.ipa -oextracted
          echo "Extracted contents:"
          dir extracted\Payload\
          
      - name: Find and run Il2CppDumper
        run: |
          $appFolder = Get-ChildItem -Path "extracted\Payload\" -Directory | Select-Object -First 1
          $exePath = Join-Path $appFolder.FullName "HillClimbRacing2"
          $metadataPath = Join-Path $appFolder.FullName "Data\Managed\Metadata\global-metadata.dat"
          Write-Host "Using EXE: $exePath"
          Write-Host "Using metadata: $metadataPath"
          .\Il2CppDumper\Il2CppDumper.exe $exePath $metadataPath output
          
      - name: Upload dump.cs
        uses: actions/upload-artifact@v4
        with:
          name: hcr2_dump
          path: output/dump.cs
